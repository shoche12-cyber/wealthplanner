function useMonthlyData(tx,n){n=n||7;return useMemo(()=>{const months=recentMonths(n);return months.map(mk=>{const mTx=tx.filter(t=>monthKey(t.date)===mk);return{month:monthLabel(mk),key:mk,income:mTx.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0),expense:mTx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0)};});},[tx,n]);}
function useAssetData(tx,base,n){n=n||7;return useMemo(()=>{const months=recentMonths(n);const net={};tx.forEach(t=>{const mk=monthKey(t.date);net[mk]=(net[mk]||0)+(t.type==="income"?t.amount:-t.amount);});let asset=base;return months.map((mk,i)=>{if(i>0)asset+=net[mk]||0;return{month:monthLabel(mk),asset:Math.max(0,asset)};});},[tx,base,n]);}
function useNisaData(nisa,n){n=n||7;return useMemo(()=>recentMonths(n).map(mk=>{const tH=(nisa.tsumitate.history||[]).find(h=>h.month===mk);const gH=(nisa.growth.history||[]).find(h=>h.month===mk);const tE=tH?tH.eval:nisa.tsumitate.holdings.reduce((s,hh)=>s+hh.eval,0);const tC=tH?tH.cost:nisa.tsumitate.used;const gE=gH?gH.eval:nisa.growth.holdings.reduce((s,hh)=>s+hh.eval,0);const gC=gH?gH.cost:nisa.growth.used;return{month:monthLabel(mk),tsumitate:tE,growth:gE,totalEval:tE+gE,cost:tC+gC};}),[nisa,n]);}

function LineChart(props){

  if(!allV.length)return null;

  const xP=i=>PL+(labels.length<=1?iW/2:(i/(labels.length-1))*iW);
  const yP=v=>PT+(1-(v-minV)/rng)*iH;
  const mkPath=d=>d.map((v,i)=>(i===0?"M":"L")+xP(i).toFixed(1)+","+yP(v).toFixed(1)).join(" ");
  const mkArea=d=>{const l=d.map((v,i)=>(i===0?"M":"L")+xP(i).toFixed(1)+","+yP(v).toFixed(1)).join(" ");return l+" L"+xP(d.length-1).toFixed(1)+","+(PT+iH).toFixed(1)+" L"+PL.toFixed(1)+","+(PT+iH).toFixed(1)+" Z";};
  const onMove=e=>{const svg=svgRef.current;if(!svg)return;const rect=svg.getBoundingClientRect();const cx=e.touches?e.touches[0].clientX:e.clientX;const x=(cx-rect.left)/rect.width*W;const idx=Math.max(0,Math.min(labels.length-1,Math.round((x-PL)/iW*(labels.length-1))));setAi(idx);onHover&&onHover(idx);};
  const onLeave=()=>{setAi(null);onHover&&onHover(null);};
  const uid=series.map(s=>s.color.replace("#","")).join("").slice(0,20);
  const tipLeft=ai!==null?Math.max(10,Math.min(90,xP(ai)/W*100)):0;
  return h("div",{style:{position:"relative"}},
    ai!==null&&h("div",{style:{position:"absolute",left:tipLeft+"%",top:0,transform:"translateX(-50%)",background:"#1C1C1E",color:"white",borderRadius:10,padding:"6px 10px",fontSize:11,fontWeight:600,zIndex:10,whiteSpace:"nowrap",boxShadow:"0 4px 16px rgba(0,0,0,0.25)",pointerEvents:"none"}},
      h("div",{style:{color:"rgba(255,255,255,0.5)",fontSize:10,marginBottom:2}},labels[ai]),
      series.map((s,si)=>h("div",{key:si,style:{display:"flex",alignItems:"center",gap:5}},
        h("div",{style:{width:6,height:6,borderRadius:99,background:s.color,flexShrink:0}}),
        h("span",{style:{color:s.color}},s.label+": "+formatY(s.data[ai]))
      ))
    ),
    h("svg",{ref:svgRef,viewBox:"0 0 "+W+" "+H,width:"100%",height:H,style:{display:"block",cursor:"crosshair",touchAction:"none"},onMouseMove:onMove,onMouseLeave:onLeave,onTouchMove:onMove,onTouchEnd:onLeave},
      h("defs",null,series.map((s,si)=>
        h("linearGradient",{key:si,id:"g"+si+uid,x1:"0",y1:"0",x2:"0",y2:"1"},
          h("stop",{offset:"0%",stopColor:s.color,stopOpacity:"0.22"}),
          h("stop",{offset:"100%",stopColor:s.color,stopOpacity:"0"})
        )
      )),
      [0,0.5,1].map((r,i)=>h("line",{key:i,x1:PL,y1:PT+iH*(1-r),x2:PL+iW,y2:PT+iH*(1-r),stroke:"#F2F2F7",strokeWidth:"1"})),
      gradientFill&&series.map((s,si)=>h("path",{key:si,d:mkArea(s.data),fill:"url(#g"+si+uid+")"})),
      series.map((s,si)=>h("path",{key:si,d:mkPath(s.data),fill:"none",stroke:s.color,strokeWidth:s.dashed?1.8:2.5,strokeDasharray:s.dashed?"5,4":undefined,strokeLinecap:"round",strokeLinejoin:"round"})),
      showDots&&series.map((s,si)=>s.data.map((v,i)=>h("circle",{key:si+"-"+i,cx:xP(i),cy:yP(v),r:ai===i?5.5:3,fill:ai===i?s.color:"white",stroke:s.color,strokeWidth:2}))),
      ai!==null&&h("line",{x1:xP(ai),y1:PT,x2:xP(ai),y2:PT+iH,stroke:"#C7C7CC",strokeWidth:"1",strokeDasharray:"3,3"}),
      labels.map((l,i)=>h("text",{key:i,x:xP(i),y:H-3,textAnchor:"middle",fontSize:9,fill:ai===i?"#007AFF":"#AEAEB2",fontWeight:ai===i?700:400,fontFamily:"-apple-system,sans-serif"},l))
    )
  );
}

function App(){

  const[tx,setTx]=useState(INIT_TX);
  const[nisa,setNisa]=useState(INIT_NISA);
  const ref=useRef(null);
  useEffect(function(){if(ref.current)ref.current.scrollTo({top:0,behavior:"smooth"});},[tab]);
  function addTx(t){setTx(function(prev){return[t].concat(prev);});}
  function editTx(u){setTx(function(prev){return prev.map(function(t){return t.id===u.id?u:t;});});}
  function delTx(id){setTx(function(prev){return prev.filter(function(t){return t.id!==id;});});}
  var TITLES={home:"資産管理",input:"収支を記録",nisa:"NISA・投資",goals:"目標・計画"};
  return h("div",{style:{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"#F2F2F7",fontFamily:"-apple-system,'Hiragino Sans','Yu Gothic',sans-serif",position:"relative",overflowX:"hidden"}},

    h("div",{ref:ref,style:{padding:"18px 14px 130px",overflowY:"auto",overflowX:"hidden",width:"100%",boxSizing:"border-box"}},
      tab==="home"  &&h(HomeScreen,{transactions:tx,nisa:nisa,onEdit:editTx,onDelete:delTx}),
      tab==="input" &&h(InputScreen,{onAdd:addTx}),
      tab==="nisa"  &&h(NisaScreen,{nisa:nisa,setNisa:setNisa}),
      tab==="goals" &&h(GoalsScreen,{transactions:tx})

    h(BottomNav,{active:tab,setActive:setTab})

}
